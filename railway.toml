# Railway config-as-code: https://docs.railway.com/deploy/config-as-code
# Repo root = this folder (contains `requirements.txt` + `slate/` Django project).

[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt && cd slate && DJANGO_SETTINGS_MODULE=slate.settings python manage.py collectstatic --noinput"

[deploy]
startCommand = "cd slate && gunicorn slate.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
releaseCommand = "cd slate && python manage.py migrate --noinput"
healthcheckPath = "/health/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
