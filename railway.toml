# Railway config-as-code: https://docs.railway.com/deploy/config-as-code
# Repo root = this folder (contains `requirements.txt` + `slate/` Django project).

[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt && cd slate && DJANGO_SETTINGS_MODULE=slate.settings python manage.py collectstatic --noinput"

[deploy]
# Migrate on boot so tables exist even if releaseCommand is skipped in the dashboard.
# For multiple replicas, prefer Railway’s “Release” phase / one-off migrate only.
startCommand = "cd slate && python manage.py migrate --noinput && gunicorn slate.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
releaseCommand = "cd slate && python manage.py migrate --noinput"
healthcheckPath = "/health/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
