# https://docs.railway.com/deploy/config-as-code
# Repo root = folder with requirements.txt + slate/

[build]
builder = "NIXPACKS"
# Nixpacks already runs `pip install -r requirements.txt`; only collectstatic is needed here.
buildCommand = "cd slate && DJANGO_SETTINGS_MODULE=slate.settings python manage.py collectstatic --noinput"

[deploy]
# Railway Postgres is not your laptop DB — migrate runs against the linked DATABASE_URL on each deploy.
releaseCommand = "cd slate && python manage.py migrate --noinput"
startCommand = "cd slate && gunicorn slate.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"

