<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something went wrong · slate.</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1A1A18;--paper:#FAFAF7;--muted:#9E9B93;--accent:#C17B4E}
html,body{min-height:100%;background:var(--paper);font-family:'DM Sans',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;padding:32px 24px}
.wrap{max-width:420px;text-align:center}
.wm{font-family:'Lora',serif;font-size:28px;font-weight:600;letter-spacing:-.02em;margin-bottom:1.5rem}
.wm span{color:var(--accent)}
h1{font-family:'Lora',serif;font-size:22px;font-weight:400;margin-bottom:.75rem}
p{font-size:15px;font-weight:300;color:var(--muted);line-height:1.6;margin-bottom:2rem}
a{display:inline-block;background:var(--ink);color:var(--paper);text-decoration:none;font-size:14px;font-weight:500;padding:12px 24px;border-radius:8px;letter-spacing:.02em}
a:hover{opacity:.85}
.code{font-size:12px;color:var(--muted);margin-top:2rem;letter-spacing:.08em}
</style>
</head>
<body>
<div class="wrap">
  <div class="wm">slate<span>.</span></div>
  <h1>Something went wrong</h1>
  <p>We couldn’t complete that request. It’s us, not you — try again in a moment.</p>
  <a href="/">Back to slate</a>
  <p class="code">500</p>
</div>
</body>
</html>
